<section class="card" [class.loading]="loading" [class.growing]="vehicleInfoVisible">
	<header>
		<div class="header-row header-buttons">
			<button type="button" class="garage-button" (click)="openGarage()">Garage</button>
			<button type="button" class="download-pdf-button" (click)="downloadPdf()" [disabled]="!vehicleInfoVisible">Download PDF</button>
			<button type="button" class="logout" (click)="logout()">Log out</button>
		</div>
		<div class="header-row header-logo">
			<img src="assets/images/Header-Logo.png" alt="VinDex logo" class="logo" />
		</div>
	</header>

	<form (ngSubmit)="search()" novalidate>
		<label class="search-field">
			<div class="search-wrapper">
				<input
		      		type="text"
		      		name="vin"
		      		[(ngModel)]="vin"
		      		placeholder="Enter a VIN"
			  		autocomplete="off"
		    	/>
		
		    	<button type="submit" class="search-icon-btn" [disabled]="loading" >
		    		<img src="assets/images/Search.png" alt="Search" />
				</button>
			</div>
		</label>

		<label class="checkbox">
			<input type="checkbox" name="withRecalls" [(ngModel)]="withRecalls" />
			Include recalls
		</label>
	</form>

	<div class="animation-area" [class.animate]="loading">
  		<img src="assets/images/Tire.png" class="tire" alt="Tire"/>
  		<img src="assets/images/Dust.png" class="dust" alt="Dust"/>
	</div>

	<p class="error" *ngIf="error">{{ error }}</p>

	<div *ngIf="vehicle" class="vehicle-info" [class.show]="vehicleInfoVisible">
		<div class="vehicle-toolbar">
			<button
				type="button"
				class="save-button"
				(click)="saveVehicle()"
				[disabled]="saving || vehicleSaved"
			>
				{{ vehicleSaved ? 'Saved' : saving ? 'Saving...' : 'Save to Garage' }}
			</button>
			<p class="save-message" *ngIf="saveMessage">{{ saveMessage }}</p>
			<p class="error" *ngIf="saveError">{{ saveError }}</p>
		</div>
		<app-vehicle-details [vehicle]="vehicle" />
	</div>

	<div *ngIf="recalls.length" class="recalls">
		<h3>Recalls ({{ recalls.length }})</h3>
		<ul>
			<li *ngFor="let recall of recalls">
				<strong>{{ recall.campaignNumber }}</strong> — {{ recall.component }}
				<div>{{ recall.summary }}</div>
				<small *ngIf="recall.reportReceivedDate">Reported: {{ recall.reportReceivedDate | date }}</small>
			</li>
		</ul>
	</div>
</section>
